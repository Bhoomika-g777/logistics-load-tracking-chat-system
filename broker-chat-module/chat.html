<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rigbot Q/A Portal</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,700,300">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.1.2/css/material-design-iconic-font.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400&family=Finger+Paint&display=swap">
    <link rel="stylesheet" href="chatstyles.css">
</head>
<body>

    <!-- PIN Authentication -->
    <div id="login-container">
        <h2>Enter Confirmation PIN</h2>
        <input type="password" id="pin-input" placeholder="Enter PIN">
        <button id="submit-pin">Proceed</button>
        <p id="error-msg"></p>
    </div>

    <!-- Chatbot Section -->
    <div id="chat-container" class="hidden">
        <div class="chat-header">
            <h2>Rigbot Q/A Chat</h2>
        </div>
        <div class="chat-box" id="chat-box">
            <p class="bot-message">Welcome, to Rigbot Q/A portal!</p>
            <p class="bot-message">How can i assist you?</p>
            <div class="menu-options">
                <button class="menu-btn" data-query="Load Management">📦 Load Management</button>
                <button class="menu-btn" data-query="Payments & Settlements">💰 Payments & Settlements</button>
                <button class="menu-btn" data-query="Invoices & Billing">📄 Invoices & Billing</button>
                <button class="menu-btn" data-query="Driver & Equipment">🚛 Driver & Equipment</button>
                <button class="menu-btn" data-query="Compliance & Documentation">📋 Compliance & Documentation</button>
                <button class="menu-btn" data-query="Support & Issues">🛠 Support & Issues</button>
            </div>
        </div>

        <!-- Chat Input -->
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Type your question...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="chatscripts.js"></script>
</body>
</html>
